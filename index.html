<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Expected Value Calculator</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: #e5e5e7;
            --accent-color: #0071e3;
            --success-color: #34c759;
            --danger-color: #ff3b30;
            --neutral-color: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            margin-bottom: 32px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        th {
            text-align: left;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 15px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        input[type="number"] {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 15px;
            width: 80px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
        }

        .ticket-price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-top: 1px solid var(--border-color);
            margin-top: 10px;
        }

        .results-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .result-item {
            display: flex;
            flex-direction: column;
        }

        .result-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 20px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 8px;
        }

        .status-profit { background-color: rgba(52, 199, 89, 0.1); color: var(--success-color); }
        .status-loss { background-color: rgba(255, 59, 48, 0.1); color: var(--danger-color); }
        .status-neutral { background-color: rgba(142, 142, 147, 0.1); color: var(--neutral-color); }

        .formula-section {
            text-align: center;
            color: var(--text-secondary);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            padding: 48px 0;
            line-height: 1.8;
        }

        .formula-line {
            margin: 12px 0;
            word-break: break-all;
        }

        .formula-title {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 16px;
            font-family: inherit;
        }

        .reset-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .reset-btn:hover {
            background: #f2f2f7;
            color: var(--text-main);
        }

        /* Chrome, Safari, Edge, Opera - remove arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox - remove arrows */
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Lottery Expected Value Calculator</h1>
            <p class="subtitle">白球 10 选 3，红球 5 选 1，总可能结果数为 600</p>
        </header>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>奖项 (Prizes)</th>
                        <th>概率 (Probability)</th>
                        <th>奖金 (Prize $)</th>
                        <th>EV Contribution</th>
                    </tr>
                </thead>
                <tbody id="prizes-table">
                    <!-- Rows will be generated by JS -->
                </tbody>
            </table>

            <div class="ticket-price-row">
                <span style="font-weight: 500;">Ticket Price (票价)</span>
                <div>
                    <span>$ </span>
                    <input type="number" id="ticket-price" step="0.1" value="10">
                </div>
            </div>

            <div class="results-section">
                <div class="result-item">
                    <span class="result-label">Expected Value (EV)</span>
                    <span class="result-value" id="total-ev">$ 0.000</span>
                </div>
                <div class="result-item">
                    <span class="result-label">House Profit (庄家利润)</span>
                    <span class="result-value" id="house-profit">$ 0.000</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Status (状态)</span>
                    <div id="status-container">
                        <span class="status-badge status-neutral" id="status-text">载入中...</span>
                    </div>
                </div>
            </div>

            <div style="text-align: right;">
                <button class="reset-btn" id="reset-btn">Reset to Default</button>
            </div>
        </div>

        <div class="formula-section">
            <div class="formula-title">Mathematical Derivation (数学推导)</div>
            <div class="formula-line" id="formula-1">EV = ...</div>
            <div class="formula-line" id="formula-2">= ...</div>
            <div class="formula-line" id="formula-3">= ...</div>
        </div>
    </div>

    <script>
        const INITIAL_DATA = {
            ticketPrice: 10,
            prizes: [
                { id: 1, label: '3白 + 红', probNum: 1, probDen: 600, defaultPrize: 200 },
                { id: 2, label: '3白', probNum: 4, probDen: 600, defaultPrize: 80 },
                { id: 3, label: '2白 + 红', probNum: 21, probDen: 600, defaultPrize: 25 },
                { id: 4, label: '2白', probNum: 84, probDen: 600, defaultPrize: 10 },
                { id: 5, label: '1白 + 红', probNum: 63, probDen: 600, defaultPrize: 5 },
                { id: 6, label: '0白 + 红', probNum: 35, probDen: 600, defaultPrize: 2 }
            ]
        };

        let currentPrizes = JSON.parse(JSON.stringify(INITIAL_DATA.prizes));
        
        const tableBody = document.getElementById('prizes-table');
        const ticketPriceInput = document.getElementById('ticket-price');
        const totalEvDisplay = document.getElementById('total-ev');
        const houseProfitDisplay = document.getElementById('house-profit');
        const statusText = document.getElementById('status-text');
        const formula1 = document.getElementById('formula-1');
        const formula2 = document.getElementById('formula-2');
        const formula3 = document.getElementById('formula-3');
        const resetBtn = document.getElementById('reset-btn');

        function initTable() {
            tableBody.innerHTML = '';
            currentPrizes.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.label}</td>
                    <td style="color: #86868b;">${item.probNum}/${item.probDen}</td>
                    <td>
                        <span style="color: #86868b; margin-right: 4px;">$</span>
                        <input type="number" class="prize-input" data-index="${index}" value="${item.defaultPrize}" step="1">
                    </td>
                    <td id="contrib-${index}" style="font-weight: 500;">$ 0.000</td>
                `;
                tableBody.appendChild(tr);
            });

            document.querySelectorAll('.prize-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = e.target.getAttribute('data-index');
                    currentPrizes[idx].currentPrize = parseFloat(e.target.value) || 0;
                    calculate();
                });
                // Initialize currentPrize
                const idx = input.getAttribute('data-index');
                currentPrizes[idx].currentPrize = parseFloat(input.value) || 0;
            });
        }

        function calculate() {
            const ticketPrice = parseFloat(ticketPriceInput.value) || 0;
            let totalEv = 0;
            
            // Step 1: Calculate contributions
            const contributions = currentPrizes.map(item => {
                const contrib = (item.probNum / item.probDen) * item.currentPrize;
                totalEv += contrib;
                return contrib;
            });

            // Update UI - Table
            contributions.forEach((contrib, idx) => {
                document.getElementById(`contrib-${idx}`).textContent = `$ ${contrib.toFixed(3)}`;
            });

            // Update UI - Totals
            totalEvDisplay.textContent = `$ ${totalEv.toFixed(3)}`;
            const houseProfit = ticketPrice - totalEv;
            houseProfitDisplay.textContent = `$ ${houseProfit.toFixed(3)}`;

            // Update Status
            statusText.className = 'status-badge';
            if (totalEv < ticketPrice) {
                statusText.textContent = '庄家长期盈利';
                statusText.classList.add('status-profit');
            } else if (Math.abs(totalEv - ticketPrice) < 0.0001) {
                statusText.textContent = '理论持平';
                statusText.classList.add('status-neutral');
            } else {
                statusText.textContent = '庄家长期亏损';
                statusText.classList.add('status-loss');
            }

            // Update Formulas
            // Line 1: EV = (1/600 * 200) + ...
            const f1Parts = currentPrizes.map(item => `(${item.probNum}/${item.probDen} · ${item.currentPrize})`);
            formula1.innerHTML = `EV = ${f1Parts.join(' + ')}`;

            // Line 2: = 0.333 + 0.133 + ...
            const f2Parts = currentPrizes.map((item, idx) => {
                const contrib = (item.probNum / item.probDen) * item.currentPrize;
                return contrib.toFixed(3);
            });
            formula2.innerHTML = `= ${f2Parts.join(' + ')}`;

            // Line 3: = 3.783
            formula3.innerHTML = `<span style="color: var(--text-main); font-weight: 600; font-size: 16px;">= ${totalEv.toFixed(3)}</span>`;
        }

        ticketPriceInput.addEventListener('input', calculate);

        resetBtn.addEventListener('click', () => {
            ticketPriceInput.value = INITIAL_DATA.ticketPrice;
            currentPrizes = JSON.parse(JSON.stringify(INITIAL_DATA.prizes));
            initTable();
            calculate();
        });

        // Initial run
        initTable();
        calculate();
    </script>
</body>
</html>
